services:
  llama-vllm:
    command:
      - vllm
      - serve
      - ${STUDENT_MODEL_ID}
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --dtype
      - bfloat16
      - --tokenizer-mode
      - hf
      - --config-format
      - auto
      - --load-format
      - auto
      - --chat-template
      - /workspace/vllm_templates/tool_chat_template_mistral_parallel.jinja
      - --max-model-len
      - ${STUDENT_CONTEXT_WINDOW:-8192}
      - --gpu-memory-utilization
      - "0.88"
      - --enable-auto-tool-choice
      - --tool-parser-plugin
      - /workspace/vllm_plugins/nano_strict_tool_parser.py
      - --tool-call-parser
      - nano_strict_mistral
